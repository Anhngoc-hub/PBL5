<!DOCTYPE html>
<html>

<head>
    <title>Report Issue</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <h1>Report New Issue</h1>
        <div class="chart-box" style="max-width: 500px;">
            <form id="ticketForm">
                <div class="form-group">
                    <label>Session ID:</label>
                    <input type="text" id="ticketSessionId" required>
                </div>
                <div class="form-group">
                    <label>Issue Description:</label>
                    <textarea id="ticketReason" rows="5"
                        style="width:100%; border-radius:6px; border:1px solid #ddd; padding:10px;"></textarea>
                </div>
                <button type="submit" style="width:100%; background:#ef4444;">Submit Ticket</button>
            </form>
            <p id="responseMessage" style="margin-top:15px; text-align:center;"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
